name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          MAC_SHA: ${{ github.event.client_payload.mac_sha }}
          LINUX_SHA: ${{ github.event.client_payload.linux_sha }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          sed -i "s/version \".*\"/version \"${CLEAN_VERSION}\"/" Formula/rememora.rb

          # Update macOS sha256
          awk -v sha="$MAC_SHA" '/on_macos/,/end/ { if (/sha256/) { sub(/"[^"]*"/, "\"" sha "\"") } } {print}' Formula/rememora.rb > tmp && mv tmp Formula/rememora.rb

          # Update Linux sha256
          awk -v sha="$LINUX_SHA" '/on_linux/,/end/ { if (/sha256/) { sub(/"[^"]*"/, "\"" sha "\"") } } {print}' Formula/rememora.rb > tmp && mv tmp Formula/rememora.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rememora.rb
          git commit -m "Update rememora to ${VERSION#v}"
          git push
